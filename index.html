<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Neuro Lab | RIT</title>
    <style>
        /* CSS Variables for Easy Light/Dark Toggling */
        :root {
            --bg-color: #ffffff;
            --text-main: #111111;
            --text-secondary: #555555;
            --rit-orange: #F76902;
            --nav-bg: #ffffff;
            --nav-text: #111111;
            --surface: #ffffff;
            --border-color: #e5e7eb;
        }

        body.dark-mode {
            --bg-color: #111111;
            --text-main: #f2f2f2;
            --text-secondary: #bdbdbd;
            --nav-bg: #000000;
            --nav-text: #ffffff;
            --surface: #1a1a1a;
            --border-color: #333333;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }

        /* Classic Academic Navigation */
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            gap: 2rem;
            background-color: var(--nav-bg);
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.3s;
        }

        nav a {
            color: var(--nav-text);
            text-decoration: none;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        nav a:hover,
        nav a[aria-current="page"] {
            color: var(--rit-orange);
        }

        .github-link {
            color: var(--rit-orange);
            font-weight: bold;
        }

        .main-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 2rem;
            min-height: calc(100vh - 120px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .split-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 3rem;
            width: 100%;
            flex-wrap: wrap;
            padding: 1rem 0;
        }

        /* Left Side: Logo */
        .left-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 320px;
            max-width: 100%;
        }

        .lab-logo {
            width: 100%;
            max-width: 320px;
            height: auto;
            border-radius: 24px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
        }

        /* Right Side: Academic Description */
        .right-box {
            width: 420px;
            max-width: 100%;
            box-sizing: border-box;
            background-color: var(--surface);
            border: 1px solid var(--border-color);
            padding: 2.25rem;
            border-radius: 22px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .right-box p {
            font-size: 1.08rem;
            line-height: 1.75;
            color: var(--text-secondary);
            margin: 0;
            font-weight: 300;
        }

        @media (max-width: 900px) {
            .main-content {
                height: auto;
                padding: 3rem 1.5rem;
                align-items: center;
            }

            .split-container {
                flex-direction: column;
                gap: 2.5rem;
            }

            .right-box {
                width: 100%;
                max-width: 640px;
            }

            .right-box p {
                text-align: center;
                font-size: 1.05rem;
            }
        }

        @media (max-width: 600px) {
            nav {
                justify-content: space-between;
                gap: 0.75rem;
                padding: 1rem;
            }

            nav a,
            .theme-btn {
                font-size: 0.8rem;
            }

            .theme-btn {
                padding: 0.5rem 0.85rem;
            }

            .main-content {
                padding: 1.5rem 0.75rem;
            }

            .logo-text {
                font-size: 1.4rem;
            }

            .right-box p {
                font-size: 1rem;
            }
        }
    </style>
    <script defer src="theme.js"></script>
</head>

<body>

    <nav>
        <a href="index.html" aria-current="page">Home</a>
        <a href="team.html">Our Team</a>
        <a href="research.html">Research</a>
        <a href="publications.html">Publications</a>
        <a href="news.html">News</a>
        <a href="join.html">Join Us</a>
        <a href="https://github.com/delta-neuro" target="_blank" class="github-link">GitHub ↗</a>
        <button id="theme-btn" class="theme-btn" aria-label="Switch to dark mode">🌙</button>
    </nav>

    <div class="main-content">
        <div class="split-container">

            <div class="left-box">
                <img src="images/deltaneuro_yaxis.png" alt="Delta Neuro Logo" class="lab-logo">
            </div>

            <div class="right-box">
                <p id="dynamic-text">Loading content...</p>
            </div>

        </div>
    </div>

    <script>
        async function loadHomepageText() {
            try {
                const response = await fetch('text_content/homepage.txt');
                if (!response.ok) throw new Error('Text file not found');
                const text = await response.text();
                document.getElementById('dynamic-text').textContent = text;
            } catch (error) {
                const message = window.location.protocol === 'file:'
                    ? 'Unable to load text from local file. Please serve the page over HTTP or use a local server.'
                    : 'Unable to load text.';
                document.getElementById('dynamic-text').textContent = message;
                console.error('Homepage text load error:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadHomepageText();
        });
    </script>

</body>

</html>
