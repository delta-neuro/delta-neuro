<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Neuro Lab | RIT</title>
    <style>
        /* CSS Variables for Easy Light/Dark Toggling */
        :root {
            /* Default Dark Mode Colors */
            --bg-color: #111111;
            --text-main: #ffffff;
            --text-secondary: #cccccc;
            --rit-orange: #F76902;
            --nav-bg: #000000;
            --border-color: #333333;
        }

        /* Light Mode Colors (Applied when button is clicked) */
        body.light-mode {
            --bg-color: #ffffff;
            --text-main: #222222;
            --text-secondary: #555555;
            --nav-bg: #f8f9fa;
            --border-color: #e5e7eb;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }

        /* Classic Academic Navigation */
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            gap: 2rem;
            background-color: var(--nav-bg);
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.3s;
        }
        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        nav a:hover {
            color: var(--rit-orange);
        }
        .github-link {
            color: var(--rit-orange);
            font-weight: bold;
        }

        /* Theme Toggle Button */
        .theme-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .theme-btn:hover {
            border-color: var(--rit-orange);
            color: var(--rit-orange);
        }

        /* Clean, Serene Center Area */
        .main-content {
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }

        .split-container {
            display: flex;
            gap: 40px;
            max-width: 900px;
            width: 100%;
            align-items: center;
        }

        /* The Two Halves */
        .left-box, .right-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Left Side: Logo */
        .left-box {
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .lab-logo {
            max-width: 200px; /* Adjust this number to make your image bigger or smaller */
            height: auto;
            margin-bottom: 15px;
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text-main);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Right Side: Academic Description */
        .right-box {
            padding-left: 40px;
            border-left: 2px solid var(--rit-orange); /* Classic academic visual divider */
        }
        .right-box p {
            font-size: 1.25rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin: 0; 
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="team.html">Our Team</a>
        <a href="research.html">Research</a>
        <a href="publications.html">Publications</a>
        <a href="news.html">News</a>
        <a href="join.html">Join Us</a>
        <a href="https://github.com/delta-neuro" target="_blank" class="github-link">GitHub ↗</a>
        <button id="theme-btn" class="theme-btn" aria-label="Switch to light mode" onclick="toggleTheme()">🌙</button>
    </nav>

    <div class="main-content">
        <div class="split-container">
            
            <div class="left-box">
                <img src="images/deltaneuro_yaxis.gif" alt="Delta Neuro Logo" class="lab-logo">
                <div class="logo-text">Delta Neuro</div>
            </div>

            <div class="right-box">
                <p id="dynamic-text">Loading content...</p>
            </div>

        </div>
    </div>

    <script>
        function updateThemeButton() {
            const button = document.getElementById('theme-btn');
            const isLightMode = document.body.classList.contains('light-mode');
            button.textContent = isLightMode ? '☀️' : '🌙';
            button.setAttribute('aria-label', isLightMode ? 'Switch to dark mode' : 'Switch to light mode');
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            updateThemeButton();
        }

        async function loadHomepageText() {
            try {
                const response = await fetch('text_content/homepage.txt');
                if (!response.ok) throw new Error('Text file not found');
                const text = await response.text();
                document.getElementById('dynamic-text').textContent = text;
            } catch (error) {
                const message = window.location.protocol === 'file:'
                    ? 'Unable to load text from local file. Please serve the page over HTTP or use a local server.'
                    : 'Unable to load text.';
                document.getElementById('dynamic-text').textContent = message;
                console.error('Homepage text load error:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateThemeButton();
            loadHomepageText();
        });
    </script>

</body>
</html>
